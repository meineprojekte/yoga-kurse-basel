<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" class="swiss-map-svg">
  <style>
    .canton { fill: #E8E0F0; stroke: #fff; stroke-width: 1.5; cursor: pointer; transition: fill 0.2s, transform 0.2s; }
    .canton:hover { fill: #D4A373; transform: scale(1.02); transform-origin: center; }
    .canton.active { fill: #6B5B95; }
    .canton.has-data { fill: #B5A8D5; }
    .canton-label { font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 600; fill: #4A3D6E; pointer-events: none; text-anchor: middle; }
    .canton-label.active { fill: #fff; }
  </style>
  <!-- Simplified Swiss canton map - approximate shapes -->
  <!-- GE - Genève -->
  <path class="canton" data-canton="geneve" d="M95,390 L75,370 L80,350 L100,340 L120,350 L125,370 L115,390 Z"/>
  <text class="canton-label" x="100" y="368">GE</text>
