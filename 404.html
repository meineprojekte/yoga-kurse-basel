<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seite nicht gefunden — Yoga Kurse Basel</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #FAFAFA;
            color: #2D2D2D;
        }

        .container {
            text-align: center;
            padding: 2rem;
            max-width: 520px;
        }

        .logo {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 2.5rem;
            text-decoration: none;
            color: #6B5B95;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
        }

        .logo-text {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 1.4rem;
            font-weight: 700;
        }

        .error-code {
            font-size: 7rem;
            font-weight: 800;
            background: linear-gradient(135deg, #6B5B95, #D4A373);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            margin-bottom: 0.5rem;
        }

        h1 {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 1.75rem;
            font-weight: 700;
            color: #2D2D2D;
            margin-bottom: 1rem;
        }

        p {
            color: #666;
            font-size: 1.05rem;
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        .btn {
            display: inline-block;
            padding: 14px 32px;
            background: #6B5B95;
            color: #fff;
            text-decoration: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            transition: background 250ms ease, transform 150ms ease;
        }

        .btn:hover {
            background: #4A3D6E;
            transform: translateY(-1px);
        }

        .btn:active {
            transform: translateY(0);
        }

        .divider {
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, #6B5B95, #D4A373);
            border-radius: 2px;
            margin: 0 auto 1.5rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="logo">
            <svg class="logo-icon" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="20" cy="20" r="20" fill="#6B5B95"/>
                <circle cx="20" cy="12" r="3.5" fill="white"/>
                <path d="M20 16c-1.5 3-2 6-2 9 0 1 .8 1.5 2 1.5s2-.5 2-1.5c0-3-.5-6-2-9z" fill="white"/>
                <path d="M18 24c-2 1.5-5 3-7 3-.8 0-1 .7-.5 1 2 1 5 .5 7.5-1.5z" fill="white" opacity=".8"/>
                <path d="M22 24c2 1.5 5 3 7 3 .8 0 1 .7.5 1-2 1-5 .5-7.5-1.5z" fill="white" opacity=".8"/>
            </svg>
            <span class="logo-text">Yoga Kurse Basel</span>
        </a>

        <div class="error-code">404</div>

        <h1>Seite nicht gefunden</h1>
        <div class="divider"></div>
        <p>
            Die angeforderte Seite existiert leider nicht oder wurde verschoben.
            Kehre zur Startseite zuruck und entdecke alle Yoga-Kurse in Basel.
        </p>

        <a href="/" class="btn">Zur Startseite</a>
    </div>
</body>
</html>
